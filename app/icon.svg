  <path d="M235 170 C208 142, 178 122, 155 108 C172 128, 202 152, 233 172Z" fill="#2a5280" opacity="0.6"/>
  <path d="M222 210 C195 180, 165 158, 140 142 C158 165, 190 192, 220 212Z" fill="#2a5280" opacity="0.6"/>
  <path d="M215 250 C188 222, 160 198, 132 178 C152 202, 182 230, 213 252Z" fill="#2a5280" opacity="0.6"/>

