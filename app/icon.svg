<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="feather" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1e4470"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
