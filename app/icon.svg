  <path d="M310 160 C340 130, 370 95, 385 55 C365 85, 335 125, 308 158Z" fill="#1B3A5C" opacity="0.7"/>
  <path d="M295 195 C330 160, 365 120, 382 75 C360 110, 325 155, 293 192Z" fill="#1B3A5C" opacity="0.7"/>
