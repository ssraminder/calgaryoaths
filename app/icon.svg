  <!-- Inkwell body -->
  <path d="M165 410 L165 355 Q165 330 195 330 L317 330 Q347 330 347 355 L347 410 Z" fill="#1B3A5C"/>

  <!-- Inkwell rim -->
  <ellipse cx="256" cy="332" rx="94" ry="20" fill="#1e4470"/>
  <ellipse cx="256" cy="332" rx="70" ry="14" fill="#0f2540"/>

  <!-- Ink surface -->
